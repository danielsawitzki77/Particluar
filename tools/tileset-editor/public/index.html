<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Particluar — Tileset Editor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    /* Tab Bar */
    .tab-bar { display: flex; background: #16213e; border-bottom: 2px solid #0f3460; align-items: center; flex-shrink: 0; }
    .tab-btn { padding: 12px 24px; cursor: pointer; border: none; background: transparent; color: #a0a0a0; font-size: 14px; font-weight: 600; transition: all 0.2s; }
    .tab-btn:hover { color: #e0e0e0; background: #1a1a2e; }
    .tab-btn.active { color: #4fc3f7; border-bottom: 2px solid #4fc3f7; background: #1a1a2e; }
    .close-btn { margin-left: auto; padding: 8px 16px; margin-right: 12px; background: #ff6b6b; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 600; }
    .close-btn:hover { background: #ff4444; }

    /* Main Content */
    .tab-content { display: none; flex: 1; overflow: hidden; min-height: 0; }
    .tab-content.active { display: flex; }

    /* Tileset Configurator Layout */
    #configurator { display: flex; height: 100%; min-height: 0; }
    .sidebar { width: 200px; min-width: 200px; background: #16213e; padding: 12px; overflow-y: auto; border-right: 1px solid #0f3460; flex-shrink: 0; }
    .sidebar h3 { margin-bottom: 8px; color: #4fc3f7; font-size: 13px; text-transform: uppercase; }
    .tileset-item { padding: 8px 12px; cursor: pointer; border-radius: 4px; margin-bottom: 4px; font-size: 13px; }
    .tileset-item:hover { background: #1a1a2e; }
    .tileset-item.selected { background: #0f3460; color: #4fc3f7; }
    .sheet-select { width: 100%; padding: 6px; margin-top: 8px; background: #1a1a2e; border: 1px solid #0f3460; color: #e0e0e0; border-radius: 3px; font-size: 12px; }

    .main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
    .controls-bar { display: flex; gap: 8px; padding: 8px 12px; background: #16213e; border-bottom: 1px solid #0f3460; align-items: center; flex-wrap: wrap; flex-shrink: 0; }
    .control-group { display: flex; align-items: center; gap: 4px; }
    .control-group label { font-size: 13px; color: #a0a0a0; white-space: nowrap; }
